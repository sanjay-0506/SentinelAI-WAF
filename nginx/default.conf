server {
    listen       80;
    server_name  localhost;

    # ─────────────────────────────────────────────
    # Security Headers
    # ─────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"            always;
    add_header X-Content-Type-Options    "nosniff"               always;
    add_header X-XSS-Protection         "1; mode=block"         always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;

    # ─────────────────────────────────────────────
    # Common proxy settings (shared snippet)
    # ─────────────────────────────────────────────
    proxy_http_version      1.1;
    proxy_set_header        Connection          "";
    proxy_connect_timeout   5s;
    proxy_read_timeout      30s;
    proxy_send_timeout      30s;
    proxy_buffering         on;
    proxy_buffer_size       4k;
    proxy_buffers           8 4k;

    # ─────────────────────────────────────────────
    # /api/  →  FastAPI Backend
    # ─────────────────────────────────────────────
    location /api/ {
        limit_req   zone=api_limit burst=20 nodelay;
        limit_conn  conn_limit 20;

        proxy_pass         http://backend;
        proxy_set_header   Host                $host;
        proxy_set_header   X-Real-IP           $remote_addr;
        proxy_set_header   X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto   $scheme;
        proxy_set_header   X-Forwarded-Host    $host;
        proxy_set_header   Upgrade             $http_upgrade;
        proxy_set_header   Connection          "";
    }

    # ─────────────────────────────────────────────
    # /  →  Next.js Frontend (catch-all)
    # ─────────────────────────────────────────────
    location / {
        limit_req  zone=general burst=100 nodelay;
        limit_conn conn_limit 50;

        proxy_pass         http://frontend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket support for Next.js HMR
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        # Cache static Next.js assets aggressively
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
            proxy_pass         http://frontend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            expires            30d;
            add_header         Cache-Control     "public, immutable";
        }
    }

    # ─────────────────────────────────────────────
    # Custom Error Pages
    # ─────────────────────────────────────────────
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }

    error_page 429 /429.html;
    location = /429.html {
        root /usr/share/nginx/html;
        internal;
        add_header Retry-After 60 always;
    }
}

# ─────────────────────────────────────────────
# Juice Shop via WAF Proxy (Port 3000)
# ─────────────────────────────────────────────
server {
    listen       3000;
    server_name  localhost;

    proxy_http_version      1.1;
    proxy_set_header        Connection          "";
    proxy_connect_timeout   5s;
    proxy_read_timeout      30s;

    location / {
        limit_req  zone=general burst=50 nodelay;
        limit_conn conn_limit 30;

        # Forward everything to FastAPI WAF proxy
        proxy_pass         http://backend/proxy/juice-shop$request_uri;
        proxy_set_header   Host                $host;
        proxy_set_header   X-Real-IP           $remote_addr;
        proxy_set_header   X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto   $scheme;
    }
}

