user  nginx;
worker_processes  auto;
worker_rlimit_nofile  65535;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
    use                 epoll;
    multi_accept        on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ─────────────────────────────────────────────
    # Logging
    # ─────────────────────────────────────────────
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for" '
                      'rt=$request_time uct="$upstream_connect_time" '
                      'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log  /var/log/nginx/access.log  main;

    # ─────────────────────────────────────────────
    # Performance
    # ─────────────────────────────────────────────
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    keepalive_requests  1000;
    types_hash_max_size 2048;
    server_tokens       off;

    # ─────────────────────────────────────────────
    # Buffer Sizes
    # ─────────────────────────────────────────────
    client_body_buffer_size     128k;
    client_header_buffer_size   1k;
    client_max_body_size        10m;
    large_client_header_buffers 4 16k;

    # ─────────────────────────────────────────────
    # Timeouts
    # ─────────────────────────────────────────────
    client_body_timeout   12s;
    client_header_timeout 12s;
    send_timeout          10s;

    # ─────────────────────────────────────────────
    # Gzip Compression
    # ─────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_min_length   256;
    gzip_types
        application/atom+xml
        application/geo+json
        application/javascript
        application/x-javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rdf+xml
        application/rss+xml
        application/vnd.ms-fontobject
        application/wasm
        application/x-web-app-manifest+json
        application/xhtml+xml
        application/xml
        font/eot
        font/otf
        font/ttf
        image/bmp
        image/svg+xml
        text/cache-manifest
        text/calendar
        text/css
        text/javascript
        text/markdown
        text/plain
        text/xml
        text/vcard
        text/vnd.rim.location.xloc
        text/vtt
        text/x-component
        text/x-cross-domain-policy;

    # ─────────────────────────────────────────────
    # Rate Limiting Zones
    # ─────────────────────────────────────────────
    limit_req_zone  $binary_remote_addr zone=api_limit:10m   rate=1000r/s;
    limit_req_zone  $binary_remote_addr zone=general:10m     rate=2000r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ─────────────────────────────────────────────
    # Upstream: FastAPI Backend
    # ─────────────────────────────────────────────
    upstream backend {
        server backend:8000;
        keepalive 32;
    }

    # ─────────────────────────────────────────────
    # Upstream: Next.js Frontend
    # ─────────────────────────────────────────────
    upstream frontend {
        server frontend:3000;
        keepalive 16;
    }

    # ─────────────────────────────────────────────
    # Upstream: OWASP Juice Shop
    # ─────────────────────────────────────────────
    upstream juice_shop {
        server juice-shop:3000;
        keepalive 8;
    }

    # ─────────────────────────────────────────────
    # Upstream: DVWA
    # ─────────────────────────────────────────────
    upstream dvwa {
        server dvwa:80;
        keepalive 8;
    }

    # Include virtual host configs
    include /etc/nginx/conf.d/*.conf;
}
