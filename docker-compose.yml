version: "3.9"

networks:
  waf-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  dvwa_db_data:

services:

  # ─────────────────────────────────────────────
  # PostgreSQL 16
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ai-waf-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wafdb}
      POSTGRES_USER: ${POSTGRES_USER:-wafuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wafpassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wafuser} -d ${POSTGRES_DB:-wafdb}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - waf-network

  # ─────────────────────────────────────────────
  # Redis 7
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ai-waf-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - waf-network

  # ─────────────────────────────────────────────
  # Backend (FastAPI)
  # ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-waf-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./logs:/app/logs
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - waf-network

  # ─────────────────────────────────────────────
  # Frontend (Next.js)
  # ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai-waf-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost/api/v1
      NODE_ENV: production
    ports:
      - "3001:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - waf-network

  # ─────────────────────────────────────────────
  # NGINX Reverse Proxy
  # ─────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: ai-waf-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "3000:3000"
      - "8080:8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./logs:/var/log/nginx
    depends_on:
      - frontend
      - backend
    healthcheck:
      test: ["CMD-SHELL", "nginx -t && curl -sf http://localhost/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - waf-network

  # ─────────────────────────────────────────────
  # OWASP Juice Shop (Target)
  # ─────────────────────────────────────────────
  juice-shop:
    image: bkimminich/juice-shop:latest
    container_name: ai-waf-juice-shop
    restart: unless-stopped
    networks:
      - waf-network

  # ─────────────────────────────────────────────
  # DVWA MySQL Database
  # ─────────────────────────────────────────────
  dvwa-db:
    image: mysql:5.7
    container_name: ai-waf-dvwa-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: dvwaroot
      MYSQL_DATABASE: dvwa
      MYSQL_USER: dvwa
      MYSQL_PASSWORD: dvwapassword
    volumes:
      - dvwa_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pdvwaroot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - waf-network

  # ─────────────────────────────────────────────
  # DVWA (Target)
  # ─────────────────────────────────────────────
  dvwa:
    image: vulnerables/web-dvwa:latest
    container_name: ai-waf-dvwa
    restart: unless-stopped
    environment:
      MYSQL_HOSTNAME: dvwa-db
      MYSQL_DATABASE: dvwa
      MYSQL_USERNAME: dvwa
      MYSQL_PASSWORD: dvwapassword
    depends_on:
      dvwa-db:
        condition: service_healthy
    networks:
      - waf-network
