name: AI-WAF CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Create .env
      run: |
        cp .env.example .env    

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and Start Stack
      run: |
        docker compose up --build -d
        echo "Waiting for services to be ready..."
        # Quick healthcheck wait
        timeout 60s bash -c 'until curl -s http://localhost/api/v1/health | grep -q "status"; do sleep 2; done'
        timeout 60s bash -c 'until curl -s http://localhost:3000 | grep -q "Juice Shop"; do sleep 2; done'

    - name: Install Test Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-asyncio pytest-cov httpx

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        pip install pytest pytest-asyncio pytest-cov    

    - name: Run Backend Tests with Coverage
      working-directory: ./backend
      run: |
        pytest tests/ --cov=app --cov-report=xml --cov-fail-under=80

    - name: Run Traffic Simulator
      run: |
        python scripts/traffic_simulator.py

    - name: Upload Coverage Report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: backend/coverage.xml

    - name: Shutdown Stack
      if: always()
      run: |
        docker compose down -v
